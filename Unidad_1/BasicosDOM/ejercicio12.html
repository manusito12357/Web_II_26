<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 12 EVENTO CLICK</title>
</head>
<body>
    <button id="boton">haz click en mi</button>
    <script>
        const boton = document.getElementById('boton')
        boton.addEventListener('click',()=>{//cuando yo haga click en este boton algo va pasar
            alert('pinchaste al boton')
        });
    </script>
</body>
</html>
