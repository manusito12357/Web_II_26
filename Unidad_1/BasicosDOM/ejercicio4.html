<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 4 QUERYSLECTORALL</title>
</head>
<body>
    <p>nombre 1</p>
    <p>nombre 2</p>
    <p>nombre 3</p>
    <script>
        const elementos = document.querySelectorAll('p')
        elementos.forEach((elemento) =>{
            elemento.style.backgroundColor = 'blue'
            elemento.style.display = 'none'//para que no haiga nada en el texto de la etiqueta
        });
    </script>
</body>
</html>
