<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 STOPPROPAGATION</title>
</head>
<body>
    <div id="padre">Elemento padre
        <div id="hijo">Elemento hijo</div>
    </div>
    <script>
        const elementoHijo = document.getElementById('hijo')
        elementoHijo.addEventListener('click',(evento)=>{
        evento.preventPropagation();
        alert('evento hijo')
        });
        const elementoPadre = document.getElementById('padre')
        elementoPadre.addEventListener('click',(evento)=>{
            alert('evento padre')
        })
    </script>
</body>
</html>
