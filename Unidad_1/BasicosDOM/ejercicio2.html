<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 2 SELECCION DE ELEMENTOS LLAMADO POR CLASE</title>
</head>
<body>
    <div class="clase-1">elemento1</div>
    <div class="clase-1">elemento2</div>
    <div class="clase-1">elemento3</div>
    <script>
        const elementos = document.getElementsByClassName('clase-1')//aqui estamos llamando atra vez de la clase que contienen esos divs
        for(const elemento of elementos){
            elemento.textContent = 'jjj';//aqui estamos cambiando el contenido del div antes elemento1 ahora jjj
            elemento.style.backgroundColor = 'red';//aqui estamos cambiando el color del fondo
        }
    </script>
</body>
</html>
