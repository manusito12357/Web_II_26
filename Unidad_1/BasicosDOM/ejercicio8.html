<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 8 USO DE STYLE</title>
</head>
<body>
    <p>uno</p>
    <p>dos</p>
    <p>tres</p>
    <p>cuatro</p>
    <script>
        const elementos = document.querySelectorAll('p')
        elementos.forEach((elementos)=>{
            elementos.style.color = 'blue'
            elementos.style.backgroundColor = 'beige'
            elementos.style.fontSize = '20px'
        })
    </script>
</body>
</html>
