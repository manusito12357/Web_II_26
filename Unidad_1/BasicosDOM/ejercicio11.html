<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 11 REMOVECHILD</title>
</head>
<body>
    <div id="contenedor">
        <div id="eliminado">eliminar</div>
    </div>
    <script>
        const elementoEliminar = document.getElementById('eliminado')
        const elementoPadre = elementoEliminar.parentElement;//identifica quien es el padre
        elementoPadre.removeChild(elementoEliminar);
    </script>
</body>
</html>
